<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
    <defs>
        <linearGradient id="grad_cover4" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#d81159;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#210124;stop-opacity:1" />
        </linearGradient>
        <style>
            .title { font-family: 'Outfit', 'Inter', sans-serif; font-weight: 800; fill: #ffffff; font-size: 24px; text-anchor: middle; }
            .subtitle { font-family: 'Outfit', 'Inter', sans-serif; font-weight: 500; fill: rgba(255,255,255,0.7); font-size: 16px; text-anchor: middle; }
            .symbol { fill: #ffffff; opacity: 0.2; }
        </style>
    </defs>
    <rect width="400" height="400" fill="url(#grad_cover4)" />
    
    <!-- Background Symbol -->
    <g class="symbol">
        <circle cx="200" cy="200" r="60" fill="none" stroke="#ffffff" stroke-width="8"/><line x1="200" y1="100" x2="200" y2="300" stroke="#ffffff" stroke-width="4"/><line x1="100" y1="200" x2="300" y2="200" stroke="#ffffff" stroke-width="4"/>
    </g>
    
    <!-- Overlay visual design elements -->
    <circle cx="200" cy="200" r="140" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none" />
    <circle cx="200" cy="200" r="100" stroke="rgba(255,255,255,0.05)" stroke-width="1" fill="none" />
    
    <!-- Text Elements -->
    <text x="200" y="320" class="title">Ye Mera Jahan</text>
    <text x="200" y="350" class="subtitle">Kushi</text>
</svg>
