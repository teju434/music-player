<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
    <defs>
        <linearGradient id="grad_cover1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1b4332;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#081c15;stop-opacity:1" />
        </linearGradient>
        <style>
            .title { font-family: 'Outfit', 'Inter', sans-serif; font-weight: 800; fill: #ffffff; font-size: 24px; text-anchor: middle; }
            .subtitle { font-family: 'Outfit', 'Inter', sans-serif; font-weight: 500; fill: rgba(255,255,255,0.7); font-size: 16px; text-anchor: middle; }
            .symbol { fill: #ffffff; opacity: 0.2; }
        </style>
    </defs>
    <rect width="400" height="400" fill="url(#grad_cover1)" />
    
    <!-- Background Symbol -->
    <g class="symbol">
        <circle cx="200" cy="200" r="80" fill="none" stroke="#ffffff" stroke-width="8"/><path d="M180,150 L240,200 L180,250 Z" fill="#ffffff"/>
    </g>
    
    <!-- Overlay visual design elements -->
    <circle cx="200" cy="200" r="140" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none" />
    <circle cx="200" cy="200" r="100" stroke="rgba(255,255,255,0.05)" stroke-width="1" fill="none" />
    
    <!-- Text Elements -->
    <text x="200" y="320" class="title">Bheemla Nayak Title Song</text>
    <text x="200" y="350" class="subtitle">Bheemla Nayak</text>
</svg>
