<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
    <defs>
        <linearGradient id="grad_cover7" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#370617;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#03071e;stop-opacity:1" />
        </linearGradient>
        <style>
            .title { font-family: 'Outfit', 'Inter', sans-serif; font-weight: 800; fill: #ffffff; font-size: 24px; text-anchor: middle; }
            .subtitle { font-family: 'Outfit', 'Inter', sans-serif; font-weight: 500; fill: rgba(255,255,255,0.7); font-size: 16px; text-anchor: middle; }
            .symbol { fill: #ffffff; opacity: 0.2; }
        </style>
    </defs>
    <rect width="400" height="400" fill="url(#grad_cover7)" />
    
    <!-- Background Symbol -->
    <g class="symbol">
        <rect x="120" y="120" width="160" height="160" stroke="#ffffff" stroke-width="8" fill="none"/><line x1="160" y1="120" x2="160" y2="280" stroke="#ffffff" stroke-width="4"/><line x1="200" y1="120" x2="200" y2="280" stroke="#ffffff" stroke-width="4"/><line x1="240" y1="120" x2="240" y2="280" stroke="#ffffff" stroke-width="4"/>
    </g>
    
    <!-- Overlay visual design elements -->
    <circle cx="200" cy="200" r="140" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none" />
    <circle cx="200" cy="200" r="100" stroke="rgba(255,255,255,0.05)" stroke-width="1" fill="none" />
    
    <!-- Text Elements -->
    <text x="200" y="320" class="title">Hukum</text>
    <text x="200" y="350" class="subtitle">Jailer</text>
</svg>
